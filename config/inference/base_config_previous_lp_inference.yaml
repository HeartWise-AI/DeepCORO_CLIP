# Inference config for previous LP model (stenosis70, epoch 18, no weighting)
# To compare with current weighted training

# Pipeline parameters
pipeline_project: !!str DeepCORO_video_linear_probing
base_checkpoint_path: !!str outputs
run_mode: !!str val
epochs: !!int 1
seed: !!int 42
tag: !!str previous_lp_inference

# wandb parameters
name: !!str previous_lp_inference
project: !!str previous_lp_inference
entity: !!str mhi_ai
use_wandb: !!bool false

# Training parameters (required but not used for inference)
scheduler_name: !!str cosine_with_warmup
num_warmup_percent: !!float 0.06918984863633086
optimizer: !!str AdamW
use_amp: !!bool true
gradient_accumulation_steps: !!int 1
lr_step_period: !!int 4
factor: !!float 0.16090885523071338
num_hard_restarts_cycles: !!int 3
warm_restart_tmult: !!float 2.0

# Dataset parameters - same as current training
data_filename: !!str /media/data1/ravram/DeepCORO_CLIP_ENCODER/datasets/reports_with_alpha_separator_with_Calcifc_Stenosis_IFR_20250601_RCA_LCA_merged_with_left_dominance_dependent_vessels.csv
num_workers: !!int 4
batch_size: !!int 2
multi_video: !!bool true
groupby_column: !!str 'StudyInstanceUID'
num_videos: !!int 10
shuffle_videos: !!bool false
datapoint_loc_label: !!str FileName

# Only stenosis columns that exist in the dataset
target_label:
  - prox_rca_stenosis
  - mid_rca_stenosis
  - dist_rca_stenosis
  - pda_stenosis
  - posterolateral_stenosis
  - left_main_stenosis
  - prox_lad_stenosis
  - mid_lad_stenosis
  - dist_lad_stenosis
  - D1_stenosis
  - D2_stenosis
  - prox_lcx_stenosis
  - mid_lcx_stenosis
  - dist_lcx_stenosis
  - om1_stenosis
  - om2_stenosis
  - bx_stenosis
  - lvp_stenosis

rand_augment: !!bool false
resize: !!int 224
frames: !!int 16
stride: !!int 1

# Model architecture - must match training
pooling_mode: !!str attention+cls_token
separate_video_attention: !!bool false
num_attention_heads: !!int 6
normalization_strategy: !!str pre_norm
use_cls_token: !!bool true
attention_hidden: !!int 256
dropout_attention: !!float 0.0

# Video Encoder parameters
model_name: !!str mvit
aggregator_depth: !!int 1
num_heads: !!int 16
video_freeze_ratio: !!float 1.0
dropout: !!float 0.0
pretrained: !!bool true

# Learning rates (required but not used for inference)
video_encoder_lr: !!float 0.00000549653349812252
video_encoder_weight_decay: !!float 0.00000044495284358638
attention_within_lr: !!float 0.004147263799348898
attention_across_lr: !!float 0.002025021570305698
attention_weight_decay: !!float 0.00005
attention_lr: !!float 0.0015
attention_within_weight_decay: !!float 0.00006304012341593597
attention_across_weight_decay: !!float 0.00000681087681405496
head_lr: !!float 3e-4
head_weight_decay: !!float 1e-5

video_encoder_checkpoint_path: !!str /media/data1/models/DeepCoro_CLIP/8av1xygm_20250605-083820_best_single_video/checkpoints/best_model_epoch_9.pt
aggregate_videos_tokens: !!bool false
per_video_pool: !!bool false
output_dir: !!str outputs/previous_lp_inference/

# Use previous LP trained model for inference
inference_model_path: !!str /media/data1/ravram/bestmodelstenosis70/best_model_epoch_18.pt

# Linear Probing parameters - only stenosis regression
